<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Agent Platform | App Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        p {
            color: #9ca3af;
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #6366f1;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
        .btn:hover {
            transform: translateY(-3px);
            background-color: #4f46e5;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }
        .bg-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <h1>ARENA</h1>
        <p>Your full-stack animation-rich portal is ready for deployment.</p>
        <a href="/login" class="btn">Enter Application</a>
    </div>

    <script>
        // Check if the user is visiting the root and redirect them to the Next.js app
        // This index.html is in /public, so it acts as a static entry point if needed.
    </script>
</body>
</html>
